services:
  - type: web
    name: Self-Role-Assignment-System
    runtime: python
    repo: https://github.com/MSTANSLOUS/Self-Role-Assignment-System.git
    plan: free
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:app
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: self-role-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.11.12