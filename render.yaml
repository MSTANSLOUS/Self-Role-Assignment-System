services:
  - type: web
    name: Self-Role-Assignment-System
    runtime: python
    repo: https://github.com/MSTANSLOUS/Self-Role-Assignment-System.git
    plan: free
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:app
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: self-role-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true

databases:
  - name: self-role-db
    databaseName: self_role_assignment
    user: self_role_user
    plan: free