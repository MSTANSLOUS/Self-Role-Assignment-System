<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Role Assignment System | MsSTANSLOUS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Splash Screen Animation */
        @keyframes fadeOut {
            0% { opacity: 1; visibility: visible; }
            100% { opacity: 0; visibility: hidden; }
        }
        
        @keyframes scalePulse {
            0% { transform: scale(0.8); opacity: 0; }
            50% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.5s ease;
        }
        
        .splash-content {
            text-align: center;
            animation: scalePulse 0.6s ease-out;
        }
        
        .loader-ring {
            width: 80px;
            height: 80px;
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top: 4px solid #ffffff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px auto;
        }
        
        .splash-name {
            font-size: 2.5rem;
            font-weight: bold;
            color: white;
            letter-spacing: 2px;
            margin-top: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        
        .splash-sub {
            color: rgba(255,255,255,0.8);
            font-size: 0.9rem;
            margin-top: 10px;
            letter-spacing: 1px;
        }
        
        .splash-dots {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 20px;
        }
        
        .dot {
            width: 8px;
            height: 8px;
            background: white;
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }
        
        .dot:nth-child(1) { animation-delay: -0.32s; }
        .dot:nth-child(2) { animation-delay: -0.16s; }
        
        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); opacity: 0.3; }
            40% { transform: scale(1); opacity: 1; }
        }
        
        .fade-out {
            animation: fadeOut 0.8s forwards;
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans antialiased">

    <!-- Splash Screen -->
    <div id="splashScreen" class="splash-screen">
        <div class="splash-content">
            <div class="loader-ring"></div>
            <div class="splash-name">MsSTANSLOUS</div>
            <div class="splash-sub">Role Assignment System</div>
            <div class="splash-dots">
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
            </div>
        </div>
    </div>

    <!-- Main Content (Hidden until splash finishes) -->
    <div id="mainContent" class="opacity-0 transition-opacity duration-1000">
        <header class="text-center py-16 px-4 bg-gradient-to-br from-blue-600 to-blue-800 text-white">
            <h1 class="text-4xl font-bold mb-2"><a href="{{ url_for('routes.admin') }}" class="hover:underline">Find Your Role</a></h1>
            <p class="text-blue-100 mt-2">Powered by MsSTANSLOUS</p>
        </header>

        <main class="max-w-6xl mx-auto px-4 py-10">
            <h2 class="text-2xl font-bold text-center text-slate-800 mb-8">Available Roles</h2>

            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                {% for role in roles %}
                <div class="bg-white border border-gray-100 rounded-lg p-6 shadow-sm hover:shadow-md hover:-translate-y-1 transition-all duration-200 flex flex-col justify-between">
                    <div>
                        <h3 class="text-lg font-bold text-slate-800 mb-2">{{ role.role }}</h3>
                        <p class="text-sm text-gray-500 leading-relaxed mb-5">{{ role.description }}</p>
                    </div>
                    <div class="flex justify-between items-center border-top border-gray-100 pt-4">
                        <span class="text-xs font-semibold text-green-600">{{ role.spots }} spots left</span>
                        
                        {% if role.spots > 0 %}
                            <button onclick="openModal('{{ role.role }}')" class="bg-blue-600 text-white text-sm font-semibold px-4 py-2 rounded hover:bg-blue-700 transition">
                                Register
                            </button>
                        {% else %}
                            <button class="bg-gray-300 text-gray-500 text-sm font-semibold px-4 py-2 rounded cursor-not-allowed" disabled>
                                Full
                            </button>
                        {% endif %}
                    </div>
                </div>
                {% endfor %}
            </div>
        </main>
    </div>

    <!-- Registration Modal -->
    <div id="regModal" class="hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-lg p-6 md:p-8 w-full max-w-md relative shadow-xl max-h-[90vh] overflow-y-auto">
            <button onclick="closeModal()" class="absolute top-4 right-5 text-gray-400 hover:text-gray-600 text-2xl font-bold">&times;</button>
            
            <h2 class="text-xl font-bold text-slate-800 mb-1">Register for Role</h2>
            <p id="selectedRoleText" class="text-sm text-gray-600 mb-6">You are registering for: <span class="font-bold text-blue-600"></span></p>
            
            <form id="registrationForm" class="flex flex-col space-y-4" method="POST" action="{{ url_for('routes.register') }}">
                <input type="hidden" id="hiddenRoleInput" name="role_name">
                
                <div>
                    <label class="text-xs font-bold text-gray-500 uppercase tracking-wide">Full Name</label>
                    <input type="text" name="full_name" placeholder="Enter your full name" required class="w-full mt-1 p-3 border border-gray-200 rounded text-sm focus:outline-none focus:border-blue-600 bg-gray-50 focus:bg-white transition">
                </div>
                
                <div>
                    <label class="text-xs font-bold text-gray-500 uppercase tracking-wide">Email</label>
                    <input type="email" name="student_email" placeholder="Enter your Personal email" required class="w-full mt-1 p-3 border border-gray-200 rounded text-sm focus:outline-none focus:border-blue-600 bg-gray-50 focus:bg-white transition">
                </div>
                
                <button type="submit" id="submitBtn" class="w-full bg-green-600 text-white font-semibold py-3 rounded hover:bg-green-700 transition mt-2 flex items-center justify-center gap-2">
                    <span id="btnText">Confirm Registration</span>
                    <svg id="loadingSpinner" class="hidden animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                </button>
            </form>
        </div>
    </div>

    <script>
        // Splash Screen Logic
        window.addEventListener('DOMContentLoaded', function() {
            const splashScreen = document.getElementById('splashScreen');
            const mainContent = document.getElementById('mainContent');
            
            // Wait 2.5 seconds then fade out splash and show content
            setTimeout(function() {
                splashScreen.classList.add('fade-out');
                setTimeout(function() {
                    splashScreen.style.display = 'none';
                    mainContent.classList.remove('opacity-0');
                    mainContent.classList.add('opacity-100');
                }, 800);
            }, 2500);
        });

        // Form Loading Effect
        const form = document.getElementById('registrationForm');
        const submitBtn = document.getElementById('submitBtn');
        const btnText = document.getElementById('btnText');
        const loadingSpinner = document.getElementById('loadingSpinner');

        if (form) {
            form.addEventListener('submit', function(e) {
                submitBtn.disabled = true;
                btnText.textContent = 'Registering...';
                loadingSpinner.classList.remove('hidden');
                submitBtn.classList.add('opacity-70', 'cursor-not-allowed');
                
                setTimeout(() => {
                    form.submit();
                }, 100);
            });
        }

        function openModal(roleName) {
            document.getElementById('regModal').classList.remove('hidden');
            document.querySelector('#selectedRoleText span').innerText = roleName;
            document.getElementById('hiddenRoleInput').value = roleName;
            
            submitBtn.disabled = false;
            btnText.textContent = 'Confirm Registration';
            loadingSpinner.classList.add('hidden');
            submitBtn.classList.remove('opacity-70', 'cursor-not-allowed');
        }

        function closeModal() {
            document.getElementById('regModal').classList.add('hidden');
            if (form) form.reset();
            submitBtn.disabled = false;
            btnText.textContent = 'Confirm Registration';
            loadingSpinner.classList.add('hidden');
            submitBtn.classList.remove('opacity-70', 'cursor-not-allowed');
        }

        window.onclick = function(event) {
            let modal = document.getElementById('regModal');
            if (event.target == modal) {
                closeModal();
            }
        }
    </script>
</body>
</html>
