<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Role Assignment System</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans antialiased">

    <header class="text-center py-16 px-4 bg-gradient-to-br from-blue-600 to-blue-800 text-white">
        <h1 class="text-4xl font-bold mb-2"><a href="{{ url_for('routes.admin') }}" >Find Your Role</a></h1>
    </header>

    <main class="max-w-6xl mx-auto px-4 py-10">
        <h2 class="text-2xl font-bold text-center text-slate-800 mb-8">Available Roles</h2>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">

    {% for role in roles %}

    <div class="bg-white border border-gray-100 rounded-lg p-6 shadow-sm hover:shadow-md hover:-translate-y-1 transition-all duration-200 flex flex-col justify-between">
        <div>
            <h3 class="text-lg font-bold text-slate-800 mb-2">{{ role.role }}</h3>

            <p class="text-sm text-gray-500 leading-relaxed mb-5">{{ role.description }}</p>
        </div>
        <div class="flex justify-between items-center border-top border-gray-100 pt-4">

            <span class="text-xs font-semibold text-green-600">{{ role.spots }} spots left</span>

            {% if role.spots > 0 %}
                <button onclick="openModal('{{ role.role }}')" class="bg-blue-600 text-white text-sm font-semibold px-4 py-2 rounded hover:bg-blue-700 transition">
                    Register
                </button>
            {% else %}
                <button class="bg-gray-300 text-gray-500 text-sm font-semibold px-4 py-2 rounded cursor-not-allowed" disabled>
                    Full
                </button>
            {% endif %}
        </div>
    </div>

    {% endfor %}
    </div>
    </main>







    <div id="regModal" class="hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-lg p-6 md:p-8 w-full max-w-md relative shadow-xl max-h-[90vh] overflow-y-auto">

            <button onclick="closeModal()" class="absolute top-4 right-5 text-gray-400 hover:text-gray-600 text-2xl font-bold">&times;</button>

            <h2 class="text-xl font-bold text-slate-800 mb-1">Register for Role</h2>
            <p id="selectedRoleText" class="text-sm text-gray-600 mb-6">You are registering for: <span class="font-bold text-blue-600"></span></p>

            <form class="flex flex-col space-y-4" method="POST" action="{{ url_for('routes.register') }}">
                <input type="hidden" id="hiddenRoleInput" name="role_name">

                <div>
                    <label class="text-xs font-bold text-gray-500 uppercase tracking-wide">Full Name</label>
                    <input type="text" name="full_name" placeholder="Enter your full name" required class="w-full mt-1 p-3 border border-gray-200 rounded text-sm focus:outline-none focus:border-blue-600 bg-gray-50 focus:bg-white transition">
                </div>

                <div>
                    <label class="text-xs font-bold text-gray-500 uppercase tracking-wide">Email</label>
                    <input type="text" name="student_email" placeholder="Enter your Personal email" required class="w-full mt-1 p-3 border border-gray-200 rounded text-sm focus:outline-none focus:border-blue-600 bg-gray-50 focus:bg-white transition">
                </div>

                <button type="submit" class="w-full bg-green-600 text-white font-semibold py-3 rounded hover:bg-green-700 transition mt-2">Confirm Registration</button>
            </form>
        </div>
    </div>

    <script>
        function openModal(roleName) {
            document.getElementById('regModal').classList.remove('hidden');
            document.querySelector('#selectedRoleText span').innerText = roleName;
            document.getElementById('hiddenRoleInput').value = roleName;
        }

        function closeModal() {
            document.getElementById('regModal').classList.add('hidden');
        }

        // Close modal if user clicks outside of it
        window.onclick = function(event) {
            let modal = document.getElementById('regModal');
            if (event.target == modal) {
                closeModal();
            }
        }
    </script>
</body>
</html>
